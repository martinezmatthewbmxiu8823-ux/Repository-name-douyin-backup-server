# Render.com 一键部署

services:
  - type: web
    name: douyin-backup-server
    env: docker
    repo: https://github.com/martinezmatthewbmxiu8823-ux7b4b/douyin-backup-server
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URL
        generateValue: true
      - key: DOUYIN_COOKIES
        sync: false
