version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:7
    container_name: douyin_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=douyin_backup

  # 备份服务器
  backup_server:
    build: .
    container_name: douyin_backup_server
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - PORT=3000
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:
